name: anticount
description: "A Flutter personal accounting app."
publish_to: 'none'

version: 1.4.2+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  provider: ^6.1.2
  intl: ^0.20.1
  shared_preferences: ^2.3.3
  crypto: ^3.0.6
  image_picker: ^1.1.2
  http: ^1.2.2
  url_launcher: ^6.3.2
  csv: ^6.0.0
  share_plus: ^10.0.0
  home_widget: ^0.7.0
  fl_chart: ^0.70.2
  file_picker: ^10.1.2
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
